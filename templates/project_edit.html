{% extends "base.html" %}
{% set title = "Projekt bearbeiten: " ~ project.name %}

{% block content %}
<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h2 style="margin: 0;">Projekt bearbeiten</h2>
        <a href="/ui/projects" class="btn btn-outline">Abbrechen</a>
    </div>
    <form action="/ui/projects/{{ project.id }}/edit" method="post">
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; align-items: start;">
            <!-- Stammdaten -->
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" value="{{ project.name }}" required>
            </div>
            <div class="form-group">
                <label>Interne Nummer</label>
                <input type="text" name="internal_number" value="{{ project.internal_number if project.internal_number else '' }}">
            </div>
            <div class="form-group">
                <label>Bereich</label>
                <select name="division">
                    <option value="IT" {% if project.division == 'IT' %}selected{% endif %}>IT</option>
                    <option value="Netzgesellschaft" {% if project.division == 'Netzgesellschaft' %}selected{% endif %}>Netzgesellschaft</option>
                    <option value="Vertrieb" {% if project.division == 'Vertrieb' %}selected{% endif %}>Vertrieb</option>
                    <option value="Kraftwerk" {% if project.division == 'Kraftwerk' %}selected{% endif %}>Kraftwerk</option>
                </select>
            </div>
            <div class="form-group">
                <label>Priorität</label>
                <select name="priority">
                    <option value="1" {% if project.priority == 1 %}selected{% endif %}>P1 - Hoch</option>
                    <option value="2" {% if project.priority == 2 %}selected{% endif %}>P2 - Mittel</option>
                    <option value="3" {% if project.priority == 3 %}selected{% endif %}>P3 - Niedrig</option>
                    <option value="4" {% if project.priority == 4 %}selected{% endif %}>P4 - Sehr Niedrig</option>
                </select>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select name="status">
                    {% for s in ['planning', 'active', 'on_hold', 'completed'] %}
                    <option value="{{ s }}" {% if project.status.value == s %}selected{% endif %}>{{ s }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group" style="grid-column: 1 / -1;">
                <label>Beschreibung</label>
                <textarea name="description" style="height: 60px;">{{ project.description if project.description else '' }}</textarea>
            </div>

            <!-- Verantwortliche & Finanzelles -->
            <div class="form-group">
                <label>Verantwortlich IT</label>
                <input type="text" name="responsible_it" value="{{ project.responsible_it if project.responsible_it else '' }}">
            </div>
            <div class="form-group">
                <label>Verantwortlich FB</label>
                <input type="text" name="responsible_fb" value="{{ project.responsible_fb if project.responsible_fb else '' }}">
            </div>
            <div class="form-group">
                <label>CATS-Nummer</label>
                <input type="text" name="cats_number" value="{{ project.cats_number if project.cats_number else '' }}">
            </div>
            <div class="form-group">
                <label>Geschäftswert / Nutzen</label>
                <input type="text" name="business_value" value="{{ project.business_value if project.business_value else '' }}">
            </div>

            <!-- Termine -->
            <div class="form-group">
                <label>Startdatum</label>
                <input type="date" name="start_date" value="{{ project.start_date }}" required>
            </div>
            <div class="form-group">
                <label>Enddatum</label>
                <input type="date" name="end_date" value="{{ project.end_date }}" required>
            </div>

            <!-- Aufwände -->
            <div class="form-group">
                <label>∑ PT Intern PAB</label>
                <input type="number" name="pt_intern_pab" step="0.5" value="{{ project.pt_intern_pab }}">
            </div>
            <div class="form-group">
                <label>∑ PT Intern Geplant</label>
                <input type="number" name="pt_intern_planned" step="0.5" value="{{ project.pt_intern_planned }}">
            </div>
            <div class="form-group">
                <label>∑ PT Extern Geplant</label>
                <input type="number" name="pt_extern_planned" step="0.5" value="{{ project.pt_extern_planned }}">
            </div>
            <div style="display: flex; align-items: center; gap: 0.75rem; height: 100%; padding-top: 1rem;">
                <input type="checkbox" name="pab_approval" id="pab_approval" {% if project.pab_approval %}checked{% endif %} style="width: 18px; height: 18px; cursor: pointer;">
                <label for="pab_approval" style="cursor: pointer; font-weight: 600; margin-bottom: 0;">Freigabe PAB?</label>
            </div>
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 1rem; padding-top: 1.5rem; margin-top: 1rem; border-top: 1px solid var(--border-color);">
            <button type="submit" class="btn btn-primary">Änderungen speichern</button>
        </div>
    </form>
</div>
{% endblock %}
