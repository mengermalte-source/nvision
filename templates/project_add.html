{% extends "base.html" %}
{% set title = "Projekt anlegen" %}

{% block content %}
<div class="card">
    <h2>Neues Projekt anlegen</h2>
    <form action="/ui/projects/add" method="post">
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; align-items: start;">
            <!-- Stammdaten -->
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" required placeholder="Projektname">
            </div>
            <div class="form-group">
                <label>Interne Nummer</label>
                <input type="text" name="internal_number" placeholder="z.B. P.Z.12345">
            </div>
            <div class="form-group">
                <label>Bereich</label>
                <select name="division">
                    <option value="IT">IT</option>
                    <option value="Netzgesellschaft">Netzgesellschaft</option>
                    <option value="Vertrieb">Vertrieb</option>
                    <option value="Kraftwerk">Kraftwerk</option>
                </select>
            </div>
            <div class="form-group">
                <label>Priorität</label>
                <select name="priority">
                    <option value="1">P1 - Hoch</option>
                    <option value="2">P2 - Mittel</option>
                    <option value="3">P3 - Niedrig</option>
                    <option value="4">P4 - Sehr Niedrig</option>
                </select>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select name="status">
                    <option value="planning">Planung</option>
                    <option value="active" selected>Aktiv</option>
                    <option value="on_hold">On Hold</option>
                    <option value="completed">Abgeschlossen</option>
                </select>
            </div>

            <div class="form-group" style="grid-column: 1 / -1;">
                <label>Beschreibung</label>
                <textarea name="description" style="height: 60px;" placeholder="Projektziele und Umfang..."></textarea>
            </div>

            <div class="form-group" style="grid-column: 1 / -1;">
                <label>Business Case (Wirtschaftlichkeitsbegründung)</label>
                <textarea name="business_case" style="height: 100px;" placeholder="Warum ist dieses Projekt wirtschaftlich rentabel? (Einsparungen, Umsatzsteigerung, Risikominimierung)..."></textarea>
            </div>

            <!-- Verantwortliche & Finanzelles -->
            <div class="form-group">
                <label>Verantwortlich IT</label>
                <input type="text" name="responsible_it" placeholder="Name IT-Verantwortlicher">
            </div>
            <div class="form-group">
                <label>Verantwortlich FB</label>
                <input type="text" name="responsible_fb" placeholder="Name Fachbereichs-Verantwortlicher">
            </div>
            <div class="form-group">
                <label>CATS-Nummer</label>
                <input type="text" name="cats_number" placeholder="Finanzstelle/Auftrag">
            </div>
            <div class="form-group">
                <label>Geschäftswert / Nutzen</label>
                <input type="text" name="business_value" placeholder="Welchen Wert hat das Projekt?">
            </div>

            <!-- Termine -->
            <div class="form-group">
                <label>Startdatum</label>
                <input type="date" name="start_date" required>
            </div>
            <div class="form-group">
                <label>Enddatum</label>
                <input type="date" name="end_date" required>
            </div>

            <!-- Aufwände -->
            <div class="form-group">
                <label>∑ PT Intern PAB</label>
                <input type="number" name="pt_intern_pab" step="0.5" value="0.0">
            </div>
            <div class="form-group">
                <label>∑ PT Intern Geplant</label>
                <input type="number" name="pt_intern_planned" step="0.5" value="0.0">
            </div>
            <div class="form-group">
                <label>∑ PT Extern Geplant</label>
                <input type="number" name="pt_extern_planned" step="0.5" value="0.0">
            </div>
            <div class="form-group">
                <label>Wirtschaftlichkeitsscore (0-10)</label>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="range" name="economic_score" id="economic_score" min="0" max="10" step="0.5" value="5.0" style="flex-grow: 1;">
                    <span id="score_value" style="font-weight: bold; width: 30px;">5.0</span>
                </div>
                <small style="color: #666;">(0 = Nicht rentabel, 10 = Hochgradig rentabel)</small>
            </div>
            <div style="display: flex; align-items: center; gap: 0.75rem; height: 100%; padding-top: 1rem;">
                <input type="checkbox" name="pab_approval" id="pab_approval" style="width: 18px; height: 18px; cursor: pointer;">
                <label for="pab_approval" style="cursor: pointer; font-weight: 600; margin-bottom: 0;">Freigabe PAB?</label>
            </div>

            <!-- Projektsteuerung -->
            <div style="grid-column: 1 / -1; margin-top: 1rem; padding: 1rem; background-color: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                <h3 style="margin-top: 0; margin-bottom: 1rem; color: var(--primary-dark);">Projektsteuerung</h3>
                
                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1rem;">
                    <div class="form-group">
                        <label>Gesamt-Status</label>
                        <select name="steering_status" style="font-weight: bold;">
                            <option value="NONE" selected>⚪ Kein Status</option>
                            <option value="GREEN" style="color: #22c55e;">🟢 GRÜN</option>
                            <option value="YELLOW" style="color: #eab308;">🟡 GELB</option>
                            <option value="RED" style="color: #ef4444;">🔴 ROT</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Zeit-Status</label>
                        <select name="steering_time" style="font-weight: bold;">
                            <option value="NONE" selected>⚪ Kein Status</option>
                            <option value="GREEN" style="color: #22c55e;">🟢 GRÜN</option>
                            <option value="YELLOW" style="color: #eab308;">🟡 GELB</option>
                            <option value="RED" style="color: #ef4444;">🔴 ROT</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Budget-Status</label>
                        <select name="steering_budget" style="font-weight: bold;">
                            <option value="NONE" selected>⚪ Kein Status</option>
                            <option value="GREEN" style="color: #22c55e;">🟢 GRÜN</option>
                            <option value="YELLOW" style="color: #eab308;">🟡 GELB</option>
                            <option value="RED" style="color: #ef4444;">🔴 ROT</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Qualitäts-Status</label>
                        <select name="steering_quality" style="font-weight: bold;">
                            <option value="NONE" selected>⚪ Kein Status</option>
                            <option value="GREEN" style="color: #22c55e;">🟢 GRÜN</option>
                            <option value="YELLOW" style="color: #eab308;">🟡 GELB</option>
                            <option value="RED" style="color: #ef4444;">🔴 ROT</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Erster Statusbericht / Steuerungstext</label>
                    <textarea name="steering_details" style="height: 100px;" placeholder="Zusammenfassung für den Lenkungsausschuss..."></textarea>
                </div>
            </div>
        </div>

        <!-- Budgetverwaltung -->
        <div style="grid-column: 1 / -1; margin-top: 1rem; padding: 1rem; background-color: #f0f9ff; border-radius: 8px; border: 1px solid #bae6fd;">
            <h3 style="margin-top: 0; margin-bottom: 1rem; color: #0369a1;">Budgetverwaltung</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem;">
                <div class="form-group">
                    <label>Budget Invest (Gesamt)</label>
                    <input type="number" name="budget_total_invest" step="1000" value="0">
                </div>
                <div class="form-group">
                    <label>Budget Unterhalt (Gesamt)</label>
                    <input type="number" name="budget_total_unterhalt" step="1000" value="0">
                </div>
                <div class="form-group">
                    <label>Budget Invest (Aktuelles Jahr)</label>
                    <input type="number" name="budget_current_year_invest" step="1000" value="0">
                </div>
                <div class="form-group">
                    <label>Budget Unterhalt (Aktuelles Jahr)</label>
                    <input type="number" name="budget_current_year_unterhalt" step="1000" value="0">
                </div>
            </div>
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 1rem; padding-top: 1.5rem; margin-top: 1rem; border-top: 1px solid var(--border-color);">
            <a href="/ui/projects" class="btn btn-outline">Abbrechen</a>
            <button type="submit" class="btn btn-primary">Projekt anlegen</button>
        </div>
    </form>
</div>

<script>
    const scoreInput = document.getElementById('economic_score');
    const scoreValue = document.getElementById('score_value');
    
    scoreInput.addEventListener('input', function() {
        scoreValue.textContent = parseFloat(this.value).toFixed(1);
        
        // Farbe basierend auf Score anpassen
        if (this.value < 3) {
            scoreValue.style.color = 'red';
        } else if (this.value < 6) {
            scoreValue.style.color = 'orange';
        } else {
            scoreValue.style.color = 'green';
        }
    });
</script>
{% endblock %}
