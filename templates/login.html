<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PRMS</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .login-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-color) 0%, #e8f0e6 100%);
        }
        .login-card {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            border: 2px solid var(--secondary-color);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .login-logo h1 {
            color: var(--primary-color);
            margin: 0;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .login-logo p {
            color: #6c757d;
            margin-top: 0.5rem;
            font-weight: 500;
        }
        .error-msg {
            background-color: #fceaea;
            color: var(--danger);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            text-align: center;
            border: 1px solid #f5c6cb;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: #495057;
        }
        .form-group input {
            /* Inherit from styles.css */
        }
        .form-group input:focus {
            /* Inherit from styles.css */
        }
        .login-footer {
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #eee;
            font-size: 0.85rem;
            color: #6c757d;
            text-align: center;
        }
        .demo-credentials {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .demo-badge {
            background: #f8f9fa;
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid #dee2e6;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <h1>PRMS</h1>
                <p>Projekt- & Ressourcenmanagement</p>
            </div>

            {% if request.query_params.get('error') %}
            <div class="error-msg">
                {{ request.query_params.get('error') }}
            </div>
            {% endif %}

            <form action="/login" method="post">
                <div class="form-group">
                    <label for="username">Benutzername</label>
                    <input type="text" id="username" name="username" placeholder="Benutzername eingeben" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Passwort</label>
                    <input type="password" id="password" name="password" placeholder="Passwort eingeben" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 1rem; font-size: 1.1rem;">
                    Anmelden
                </button>
            </form>

            <div class="login-footer">
                <div>Demo-Zugangsdaten:</div>
                <div class="demo-credentials">
                    <span class="demo-badge"><strong>Admin:</strong> admin / admin</span>
                    <span class="demo-badge"><strong>User:</strong> alice / alice</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
