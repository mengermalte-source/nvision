<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - N-VISION</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="/static/js/app.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div style="position: fixed; top: 1rem; right: 1rem; z-index: 1000;">
        <button id="themeToggle" class="btn btn-icon-only" title="Farbmodus umschalten" style="background: var(--white); color: var(--primary-dark); border: 1px solid var(--border-color); cursor: pointer; padding: 5px 10px; border-radius: var(--radius-md); box-shadow: var(--card-shadow);">
            <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
            <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        </button>
    </div>
    <div class="login-card">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <div style="font-size: 2.5rem; font-weight: 800; color: var(--primary-dark); letter-spacing: -0.05em; margin-bottom: 0.5rem;">N-VISION</div>
            <div style="color: var(--text-muted); font-weight: 500;">Projekt- & Ressourcenmanagement</div>
        </div>

        {% if request.query_params.get('error') %}
        <div style="background: #fee2e2; color: #991b1b; padding: 1rem; border-radius: var(--radius-md); margin-bottom: 2rem; font-size: 0.875rem; font-weight: 600; border: 1px solid #fecaca; text-align: center;">
            {{ request.query_params.get('error') }}
        </div>
        {% endif %}

        <form action="/login" method="post">
            <div class="form-group">
                <label for="username">Benutzername</label>
                <input type="text" id="username" name="username" placeholder="Benutzername eingeben" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Passwort</label>
                <input type="password" id="password" name="password" placeholder="Passwort eingeben" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.875rem; font-size: 1rem;">
                Anmelden
            </button>
        </form>

        <div style="margin-top: 2.5rem; padding-top: 2rem; border-top: 1px solid var(--border-color); text-align: center;">
            <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); font-weight: 700; margin-bottom: 1rem;">Demo-Zugangsdaten</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                <div style="background: var(--bg-color); padding: 0.5rem; border-radius: var(--radius-md); font-size: 0.8rem; border: 1px solid var(--border-color);">
                    <div style="font-weight: 700; color: var(--primary-dark);">Admin</div>
                    <div style="color: var(--text-muted);">admin / admin</div>
                </div>
                <div style="background: var(--bg-color); padding: 0.5rem; border-radius: var(--radius-md); font-size: 0.8rem; border: 1px solid var(--border-color);">
                    <div style="font-weight: 700; color: var(--primary-dark);">User</div>
                    <div style="color: var(--text-muted);">alice / alice</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
